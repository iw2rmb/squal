name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shared-boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Enforce no mill/internal dependency in shared modules
        run: ./scripts/check_no_mill_internal.sh
